<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to Invert Image Online</title>
  <!-- 核心：meta标签跳转（无脚本也生效），3秒延迟可改0秒立即跳 -->
  <meta http-equiv="refresh" content="0; url=https://invert-image.online">
  <style>
    /* 简单过渡样式，跳转前显示提示 */
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f8fafc;
      color: #1e293b;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 500;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Redirecting to Invert Image Online...</h2>
    <p>If nothing happens, click here: <a href="https://invert-image.online" target="_blank" rel="noopener noreferrer">https://invert-image.online</a></p>
  </div>
  <!-- JS脚本跳转（比meta更快，优先执行） -->
  <script>
    window.location.href = 'https://invert-image.online';
  </script>
</body>
</html>
